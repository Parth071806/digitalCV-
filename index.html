<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parth Raizada — Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#EEF1EB;--paper-2:#E6EAE1;--card:#FBFCF9;
    --ink:#1E2B25;--ink-soft:#445249;--ink-faint:#7C887F;--line:#D4DACB;
    --sage:#6E9080;--teal:#356B78;--brass:#B6862F;--mauve:#8A6D8E;--live:#C2974A;
    --spine-w:2px;--r:14px;
    --shadow:0 1px 2px rgba(30,43,37,.05), 0 12px 32px -18px rgba(30,43,37,.22);
    --f-display:"Fraunces",Georgia,serif;--f-body:"IBM Plex Sans",system-ui,sans-serif;--f-mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:radial-gradient(1100px 600px at 78% -8%, #E9EFE3 0%, transparent 60%),var(--paper);
    color:var(--ink);font-family:var(--f-body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  ::selection{background:rgba(182,134,47,.22)}
  .wrap{max-width:980px;margin:0 auto;padding:0 24px}

  header.hero{padding:64px 0 36px;position:relative}
  .avatar-wrap{position:relative;width:108px;height:108px;margin-bottom:22px}
  .avatar{width:108px;height:108px;border-radius:50%;padding:3px;border:0;cursor:pointer;
    background:conic-gradient(from 210deg,var(--brass),var(--mauve),var(--teal),var(--sage),var(--brass));
    display:block;transition:transform .25s ease}
  .avatar:hover{transform:scale(1.03)}
  .avatar:active{transform:scale(.96)}
  .avatar:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .avatar-gap{display:block;width:100%;height:100%;border-radius:50%;padding:3px;background:var(--paper)}
  .avatar-inner{display:flex;align-items:center;justify-content:center;width:100%;height:100%;border-radius:50%;
    overflow:hidden;background:linear-gradient(150deg,#8aa897,#5d7c6d)}
  .avatar-inner img{width:100%;height:100%;object-fit:cover;display:block}
  .avatar-initial{font-family:var(--f-display);font-weight:500;font-size:42px;color:#fff;line-height:1}
  .avatar-cam{position:absolute;right:-2px;bottom:-2px;width:30px;height:30px;border-radius:50%;
    background:var(--ink);color:var(--paper);border:3px solid var(--paper);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.18s}
  .avatar-cam:hover{background:var(--brass)}
  .avatar-cam:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  .avatar-cam svg{width:14px;height:14px}

  .eyebrow{font-family:var(--f-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-faint);display:flex;align-items:center;gap:10px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--live);
    box-shadow:0 0 0 0 rgba(194,151,74,.55);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(194,151,74,.5)}70%{box-shadow:0 0 0 9px rgba(194,151,74,0)}100%{box-shadow:0 0 0 0 rgba(194,151,74,0)}}
  h1.name{font-family:var(--f-display);font-optical-sizing:auto;font-weight:500;
    font-size:clamp(40px,7vw,74px);line-height:.98;letter-spacing:-.015em;margin:16px 0 14px}
  h1.name em{font-style:italic;color:var(--brass);font-weight:500}
  .tagline{font-size:clamp(17px,2.4vw,21px);color:var(--ink-soft);max-width:60ch;margin:0 0 26px}
  .meta{display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center}
  .meta a{font-family:var(--f-mono);font-size:13px;text-decoration:none;color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid transparent;transition:.2s}
  .meta a:hover{color:var(--ink);border-color:var(--brass)}
  .meta a svg{width:15px;height:15px;flex:none}

  .lightbox{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
    background:rgba(18,24,20,.84);backdrop-filter:blur(6px);opacity:0;transition:opacity .25s}
  .lightbox.open{opacity:1}
  .lightbox[hidden]{display:none}
  .lb-photo{width:min(74vw,360px);height:min(74vw,360px);border-radius:50%;padding:4px;
    background:conic-gradient(from 210deg,var(--brass),var(--mauve),var(--teal),var(--sage),var(--brass));
    transform:scale(.9);transition:transform .3s cubic-bezier(.2,.9,.3,1.2)}
  .lightbox.open .lb-photo{transform:scale(1)}
  .lb-photo .avatar-gap{padding:4px}
  .lb-close{position:absolute;top:22px;right:22px;width:42px;height:42px;border-radius:50%;
    background:rgba(255,255,255,.12);color:#fff;border:0;font-size:24px;cursor:pointer;line-height:1}
  .lb-close:hover{background:rgba(255,255,255,.22)}

  .controls{position:sticky;top:0;z-index:30;background:linear-gradient(var(--paper) 62%, transparent);padding:16px 0 14px;margin-top:10px}
  .filters{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-family:var(--f-mono);font-size:12.5px;letter-spacing:.02em;border:1px solid var(--line);
    background:var(--card);color:var(--ink-soft);padding:7px 13px;border-radius:999px;cursor:pointer;
    transition:.18s;display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--ink-faint);color:var(--ink)}
  .chip .swatch{width:8px;height:8px;border-radius:2px}
  .chip[aria-pressed="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip[aria-pressed="true"] .swatch{outline:1px solid rgba(255,255,255,.5)}

  .timeline{position:relative;padding:30px 0 20px;margin-left:8px}
  .spine{position:absolute;left:7px;top:0;bottom:0;width:var(--spine-w);background:var(--line);border-radius:2px}
  .spine-fill{position:absolute;left:7px;top:0;width:var(--spine-w);height:0;border-radius:2px;
    background:linear-gradient(var(--live),var(--brass) 30%,var(--sage));box-shadow:0 0 10px -1px rgba(110,144,128,.6)}
  .entry{position:relative;padding:0 0 30px 44px;opacity:0;transform:translateY(14px)}
  .entry.in{opacity:1;transform:none;transition:opacity .6s ease, transform .6s ease}
  .entry.hidden-cat{display:none}
  .node{position:absolute;left:0;top:4px;width:16px;height:16px;border-radius:50%;
    background:var(--card);border:2px solid var(--ink-faint);z-index:2;transition:transform .25s, box-shadow .25s}
  .entry[data-cat="experience"] .node{border-color:var(--teal)}
  .entry[data-cat="project"] .node{border-color:var(--brass)}
  .entry[data-cat="hobbies"] .node{border-color:var(--sage)}
  .entry.live .node{border-color:var(--live);background:var(--live);box-shadow:0 0 0 4px rgba(194,151,74,.16);animation:pulse 2.6s infinite}
  .entry.reached .node{transform:scale(1.06)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
    overflow:hidden;transition:border-color .2s, box-shadow .2s, transform .2s}
  .card:hover{box-shadow:0 1px 2px rgba(30,43,37,.05),0 18px 40px -20px rgba(30,43,37,.3);transform:translateY(-1px)}
  .card-head{width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:18px 20px;display:block;font:inherit;color:inherit}
  .card-head:focus-visible{outline:2px solid var(--brass);outline-offset:-2px}
  .toprow{display:flex;justify-content:space-between;gap:14px;align-items:baseline;flex-wrap:wrap}
  .period{font-family:var(--f-mono);font-size:12px;letter-spacing:.04em;color:var(--ink-faint);white-space:nowrap}
  .status{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    padding:3px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:6px;
    background:rgba(194,151,74,.14);color:#8a6320}
  .role{font-family:var(--f-display);font-weight:500;font-size:22px;line-height:1.15;margin:9px 0 2px;letter-spacing:-.01em}
  .org{font-size:14.5px;color:var(--ink-soft);font-weight:500}
  .org .cat-tag{font-family:var(--f-mono);font-size:11px;color:var(--ink-faint);margin-left:10px;text-transform:uppercase;letter-spacing:.08em}
  .summary{margin:11px 0 0;color:var(--ink-soft);font-size:15px}
  .chev{float:right;width:18px;height:18px;color:var(--ink-faint);transition:transform .28s;margin-top:2px}
  .card-head[aria-expanded="true"] .chev{transform:rotate(180deg)}
  .detail{max-height:0;overflow:hidden;transition:max-height .4s ease}
  .detail-inner{padding:0 20px 20px;border-top:1px solid var(--line);margin-top:2px}
  .detail-inner ul{margin:14px 0 0;padding:0;list-style:none}
  .detail-inner li{position:relative;padding-left:20px;margin:0 0 8px;font-size:14.5px;color:var(--ink-soft)}
  .detail-inner li::before{content:"▸";position:absolute;left:0;color:var(--brass);font-size:12px;top:1px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}
  .tag{font-family:var(--f-mono);font-size:11.5px;color:var(--ink-soft);background:var(--paper-2);
    border:1px solid var(--line);padding:4px 9px;border-radius:6px}

  .skills{padding:20px 0 10px}
  .sec-label{font-family:var(--f-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-faint);display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .sec-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .skill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
  .skill-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .skill-card h3{font-family:var(--f-display);font-weight:500;font-size:18px;margin:0 0 12px}
  .skill-card .tags{margin-top:0}

  .meta .meta-plain{font-family:var(--f-mono);font-size:13px;color:var(--ink-soft);
    display:inline-flex;align-items:center;gap:7px;padding:6px 0;}
  .meta .meta-plain svg{width:15px;height:15px;flex:none}
  footer{padding:54px 0 70px;color:var(--ink-faint);font-family:var(--f-mono);font-size:12.5px}

  @media (max-width:620px){header.hero{padding:48px 0 22px}.role{font-size:19px}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}.entry{opacity:1;transform:none}}
  @media print{
    @page{margin:14mm}
    body{background:#fff}
    .controls,.chev,footer .hint,.avatar-cam{display:none!important}
    .spine,.spine-fill,.node{display:none}
    .entry{opacity:1!important;transform:none!important;page-break-inside:avoid;padding-left:0}
    .entry.hidden-cat{display:block!important}
    .card,.skill-card{box-shadow:none;border-color:#ccc}
    .detail{max-height:none!important}.detail-inner{border-top:1px solid #ddd}
    a{text-decoration:none}
  }

  /* ============ INLINE BIO EDITOR ============ */
  .bio-wrap{position:relative}
  .tagline[contenteditable]{
    outline:none;border-radius:8px;padding:6px 10px;margin:-6px -10px;
    transition:background .2s,box-shadow .2s;cursor:text;
    white-space:pre-wrap;
  }
  .tagline[contenteditable]:hover{background:rgba(182,134,47,.07)}
  .tagline[contenteditable]:focus{
    background:rgba(182,134,47,.1);
    box-shadow:0 0 0 2px rgba(182,134,47,.35);
  }
  .edit-hint{
    font-family:var(--f-mono);font-size:11px;color:var(--ink-faint);
    margin-top:6px;display:flex;align-items:center;gap:8px;opacity:0;
    transition:opacity .25s;user-select:none;
  }
  .bio-wrap:hover .edit-hint,.tagline:focus ~ .edit-hint{opacity:1}
  .edit-hint svg{width:12px;height:12px;flex:none}
  .copy-badge{
    font-family:var(--f-mono);font-size:11px;
    background:var(--ink);color:var(--paper);
    padding:3px 8px;border-radius:5px;margin-left:8px;
    opacity:0;transition:opacity .3s;pointer-events:none;
  }
  .copy-badge.show{opacity:1}

</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="avatar-wrap">
      <button class="avatar" id="avatarBtn" aria-label="View profile photo">
        <span class="avatar-gap"><span class="avatar-inner" id="avatarInner"></span></span>
      </button>
      <button class="avatar-cam" id="camBtn" aria-label="Change photo (preview)" title="Change photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <input type="file" id="photoInput" accept="image/*" hidden />
    </div>
    <div class="eyebrow"><span class="dot"></span> Currently at MDI Gurgaon</div>
    <h1 class="name">Parth Raizada<em>.</em></h1>
    <div class="bio-wrap">
      <p class="tagline" id="tagline" contenteditable="true" spellcheck="false" aria-label="Edit bio"></p>
      <div class="edit-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Click to edit bio
        <span class="copy-badge" id="copyBadge">Copied!</span>
      </div>
    </div>
    <nav class="meta" id="meta"></nav>
  </header>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <div class="lb-photo"><span class="avatar-gap"><span class="avatar-inner" id="lbInner"></span></span></div>
  </div>

  <div class="controls">
    <div class="filters" id="filters" role="group" aria-label="Filter timeline by section"></div>
  </div>

  <main class="timeline" id="timeline">
    <div class="spine"></div>
    <div class="spine-fill" id="spineFill"></div>
  </main>

  <section class="skills">
    <div class="sec-label">Capabilities</div>
    <div class="skill-grid" id="skills"></div>
  </section>

  <footer>
    <span class="hint">↑ scroll the spine · click any card to expand · tap photo to enlarge</span>
  </footer>
</div>

let currentPhoto=PROFILE.photo;

const lightbox=document.getElementById('lightbox');

cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='chip';b.type='button';b.dataset.cat=c;

  filterEl.appendChild(b);
});

  const e=document.createElement('article');
  e.className='entry'+(d.live?' live':'');
  e.dataset.cat=d.cat;
  e.innerHTML=`
    <span class="node"></span>
    <div class="card">

tl.querySelectorAll('.card-head').forEach(btn=>{

    const open=btn.getAttribute('aria-expanded')==='true';
    const panel=document.getElementById(btn.getAttribute('aria-controls'));
    btn.setAttribute('aria-expanded',String(!open));
    panel.style.maxHeight=open?'0px':panel.scrollHeight+24+'px';
  });
});

const io=new IntersectionObserver(ents=>{ents.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');io.unobserve(en.target);}});},{threshold:.18,rootMargin:'0px 0px -40px 0px'});
tl.querySelectorAll('.entry').forEach(e=>io.observe(e));

function applyFilter(force){
  tl.querySelectorAll('.entry').forEach(e=>{
    const show = e.dataset.cat===active;
    e.classList.toggle('hidden-cat',!show);
    if(show && force) e.classList.add('in');   /* avoid stuck-invisible on tab switch */
  });
  requestAnimationFrame(updateSpine);
}
filterEl.addEventListener('click',ev=>{
  const chip=ev.target.closest('.chip');if(!chip)return;
  active=chip.dataset.cat;
  filterEl.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed',String(c.dataset.cat===active)));
  window.scrollTo({top:0,behavior:'smooth'});
  applyFilter(true);
});
applyFilter(false);   /* show only the first section on load */

const spineFill=document.getElementById('spineFill');
function updateSpine(){
  const r=tl.getBoundingClientRect();const vh=window.innerHeight;const total=r.height;
  const passed=Math.min(Math.max(vh*0.5-r.top,0),total);
  spineFill.style.height=passed+'px';
  tl.querySelectorAll('.entry').forEach(e=>{const n=e.querySelector('.node');const nr=n.getBoundingClientRect();e.classList.toggle('reached',nr.top<vh*0.5+8);});
}
let ticking=false;
window.addEventListener('scroll',()=>{if(!ticking){requestAnimationFrame(()=>{updateSpine();ticking=false;});ticking=true;}},{passive:true});
window.addEventListener('resize',updateSpine);
window.addEventListener('load',updateSpine);
updateSpine();

const tagEl = document.getElementById('tagline');
/* seed text from PROFILE */
tagEl.textContent = PROFILE.tagline;

tagEl.addEventListener('input', () => {
  /* update live so refresh-from-data doesn't clobber edits */
  PROFILE.tagline = tagEl.textContent;
});

tagEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    tagEl.blur();
  }
  if (e.key === 'Escape') tagEl.blur();
});

/* copy-to-clipboard so user can paste updated bio into the file */
tagEl.addEventListener('blur', () => {
  const text = tagEl.textContent.trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const badge = document.getElementById('copyBadge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  }).catch(()=>{});
});
